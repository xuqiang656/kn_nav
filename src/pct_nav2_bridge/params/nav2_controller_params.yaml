# =============================================================================
# Nav2 Controller Server — standalone params for pct_nav2_bridge
#
# Only controller_server is configured.  No planner_server, no bt_navigator,
# no map_server, no AMCL.  PCT handles global planning; Nav2 only does
# /pct_path → /cmd_vel via Regulated Pure Pursuit.
# =============================================================================

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # Goal checker parameters
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    # Regulated Pure Pursuit Controller
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.2
      lookahead_dist: 0.5
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.8
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.4
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false        # disable for initial bring-up
      max_allowed_time_to_collision_upstream: 1.0
      use_cost_regulated_linear_velocity_scaling: false
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.05
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.5
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 0.5
      max_robot_pose_search_dist: 10.0
      use_interpolation: true
      use_approach_linear_velocity_scaling: true

# =============================================================================
# Local costmap (minimal) — only for local obstacle avoidance
# =============================================================================

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.3
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 5.0  # keep small for local-only
          obstacle_max_range: 4.0
          # Inf values are used to avoid filtering
          raytrace_min_range: 0.0
          obstacle_min_range: 0.0
      # static_layer is intentionally NOT included — no global map.
      always_send_full_costmap: true

# =============================================================================
# Velocity smoother (optional, recommended for production)
# =============================================================================

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    max_velocity: [0.3, 0.0, 0.6]
    min_velocity: [-0.3, 0.0, -0.6]
    max_accel: [0.5, 0.0, 1.0]
    max_decel: [0.5, 0.0, 1.0]
    odom_topic: "/odom"
    odom_timeout: 0.1
    deadband_velocity: [0.01, 0.0, 0.01]
    velocity_timeout: 1.0
    use_realtime_priority: false
