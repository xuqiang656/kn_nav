art_planner:
  ros__parameters:
    planner:
      name: rrt_star
      elevation_layer: elevation
      traversability_layer: traversability
      plan_time: 0.5
      n_threads: 2
      replan_freq: 1.0
      traversability_thres: 0.4
      simplify_solution: true
      snap_goal_to_map: true
      unknown_space_untraversable: true
      safety:
        foothold_margin: 0.10
        foothold_margin_max_hole_size: 0.20
        foothold_margin_max_drop: 0.25
        foothold_margin_max_drop_search_radius: 0.30
        foothold_margin_min_step: 0.15
        foothold_size: 0.20
      start_goal_search:
        start_radius: 0.20
        goal_radius: 0.50
        n_iter: 1000
      lazy_prm_star_min_update:
        invalidate_updated_graph_components: true
        height_change_for_update: 0.05
        cleanup_when_not_planning: true
      prm_motion_cost:
        max_sample_time: 2.0
        max_n_vertices: 10000
        max_n_edges: 50000
        recompute_density_after_n_samples: 1000
        max_query_edge_length: 0.5
        risk_threshold: 0.5
        cost_weights:
          energy: 0.0
          time: 1.0
          risk: 5.0
    objectives:
      custom_path_length:
        use_directional_cost: true
        max_lon_vel: 0.5
        max_lat_vel: 0.1
        max_ang_vel: 0.5
    sampler:
      max_pitch_pert: 10.0
      max_roll_pert: 3.33
      sample_from_distribution: true
      use_inverse_vertex_density: false
      use_max_prob_unknown_samples: true
      max_prob_unknown_samples: 0.1
    robot:
      base_frame: base_link
      torso:
        length: 0.70
        width: 0.31
        height: 0.40
        offset:
          x: 0.0
          y: 0.0
          z: 0.04
      feet:
        offset:
          x: 0.35
          y: 0.15
          z: -0.40
        reach:
          x: 0.20
          y: 0.20
          z: 0.20
    verbose: true
