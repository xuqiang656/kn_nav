pct_art_coordinator:
  ros__parameters:
    global_frame: map
    robot_frame: base_link
    global_path_topic: /pct_path
    art_path_topic: /art_planner/path
    map_topic: /traversability_map
    local_path_topic: /local_path
    local_goal_topic: /local_goal
    status_topic: /pct_art_local_navigation/status
    art_action_name: /art_planner/plan_to_goal
    update_rate: 2.0
    lookahead_distance: 3.5
    minimum_goal_distance: 0.8
    maximum_goal_distance: 4.0
    map_edge_margin: 0.8
    advance_distance: 1.5
    goal_update_distance: 0.8
    goal_update_min_period: 0.5
    goal_reached_distance: 0.35
    goal_yaw_tolerance: 0.175
    progress_backtrack_points: 10
    progress_forward_search_points: 200
    maximum_path_start_distance: 1.0
    maximum_path_goal_distance: 0.8
    map_timeout: 6.0
    localization_timeout: 0.5
    art_path_timeout: 2.0
    tf_timeout: 0.1
    enable_path_smoothing: true
    path_min_point_spacing: 0.10
    path_resample_spacing: 0.10
    path_collinear_angle_threshold: 0.08
    path_smoothing_iterations: 20
    path_smoothing_data_weight: 0.45
    path_smoothing_smooth_weight: 0.20
    path_max_deviation: 0.15
