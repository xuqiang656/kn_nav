art_planner:
  ros__parameters:
    planner:  
        name: "rrt_star"                         # 规划器类型 [rrt_star, inf_rrt_star, rrt_sharp, lazy_prm_star, lazy_prm_star_min_update, prm_motion_cost]
        elevation_layer: "elevation"                  # 包含高程信息的图层名称。
        traversability_layer: "traversability"          # 包含可通行性信息的图层名称。
        plan_time: 0.5                                 # [s]   单次规划时长。
        n_threads: 2                                    # ROS 执行器使用的线程数。
        replan_freq: 1.0                                # [Hz]    重规划频率。
        traversability_thres: 0.15                      # 可通行性低于该阈值时视为不可通行。
        simplify_solution: true                         # 发布前简化规划得到的路径。
        snap_goal_to_map: true                          # 从高程地图中获取目标点的 z、roll、pitch。
        unknown_space_untraversable: false              # 测试 elevation_mapping_cupy 时允许未知区域参与规划，避免 observed 掩膜把起点置为不可通行。
        safety:
            foothold_margin: 0.0                        # [m] 测试阶段关闭边缘腐蚀，避免局部空洞导致 elevation_masked=-inf。
            foothold_margin_max_hole_size: 0.0          # [m] 测试阶段关闭孔洞闭运算。
            foothold_margin_max_drop: 1.0               # [m] 放宽高度落差过滤，先验证基础规划链路。
            foothold_margin_max_drop_search_radius: 0.0 # [m] 测试阶段关闭高度落差搜索半径。
            foothold_margin_min_step: 1.0               # [m] 放宽台阶过滤，先验证基础规划链路。
            foothold_size: 0.0                          # [m] 测试阶段关闭最小落足区域过滤。
        start_goal_search:
            start_radius: 0.2                           # [m] 若起点无效，则在该半径内搜索有效起点。
            goal_radius: 0.5                            # [m] 若目标点无效，则在该半径内搜索有效目标点。
            n_iter: 1000                                # 为寻找有效位姿进行的采样次数。
        lazy_prm_star_min_update:
            invalidate_updated_graph_components: true   # 将最近观测到、可能已变化的规划图顶点和边标记为失效。
            height_change_for_update: 0.05              # [m] 栅格高度变化超过该值时认为该栅格已更新。
            cleanup_when_not_planning: true             # 未规划时在独立线程中执行有效性检查。
        prm_motion_cost:
            max_sample_time: 2.0                        # 分配给采样的最长时间。
            max_n_vertices: 10000                       # 规划图中顶点数量达到该值后停止采样。
            max_n_edges: 50000                            # 规划图中边数量达到该值后停止采样。
            recompute_density_after_n_samples: 1000     # 每采样这么多顶点后重新计算顶点密度。
            max_query_edge_length: 0.5                  # 查询代价时允许的最大边长。
            risk_threshold: 0.5                         # 将边判定为有效时允许的最大风险值。
            cost_weights:
                energy: 0.0
                time: 1.0
                risk: 5.0
    objectives:                                         # 使用 prm_motion_cost 时该部分不生效。
        custom_path_length:
            use_directional_cost: true                  # 启用不同方向上的差异化代价。
            max_lon_vel: 0.5                            # [m/s]   最大纵向速度。
            max_lat_vel: 0.1                            # [m/s]   最大横向速度。
            max_ang_vel: 0.5                            # [rad/s] 最大角速度。
    
    sampler:        
        max_pitch_pert: 10.0                            # [degree]  采样时允许的最大俯仰角扰动。
        max_roll_pert: 3.33                             # [degree]  采样时允许的最大横滚角扰动。
        sample_from_distribution: true                  # 是否使用自定义采样分布；否则在地图中均匀采样。
        use_inverse_vertex_density: true                # 仅对 "lazy_prm_star_min_update" 生效，使采样偏向规划图顶点密度较低的区域。
        use_max_prob_unknown_samples: true              # 将未知区域采样概率限制在指定范围内。
        max_prob_unknown_samples: 0.1                   # 从未知区域采样的最大概率。
    
    robot:      
        base_frame: "base_link"                              # 用于获取机器人位姿的坐标系 ID。
        torso:
            length: 0.70                                # [m] 长度。
            width: 0.31                                 # [m] 宽度。
            height: 0.40                                # [m] 高度。
            offset:                                     # [m] 机身中心相对于 base_frame 的偏移。
                x: 0.0
                y: 0.0
                z: 0.04
        feet:
            offset:                                     # [m] 足端可达区域盒相对于 base_frame 的偏移。
                x: 0.35                                # 数值正负号不影响配置含义。
                y: 0.15                                # 数值正负号不影响配置含义。
                z: -0.40
            reach:                                      # [m] 足端可达区域盒尺寸。
                x: 0.2
                y: 0.2
                z: 0.2
    
    verbose: true
